name: PGL
x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - observability

services:
  prometheus:
    <<: *service-defaults
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.12.0}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    <<: *service-defaults
    image: grafana/loki:${LOKI_VERSION:-3.7.2}
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      LOKI_RETENTION: ${LOKI_RETENTION:-360h}
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${LOKI_PORT:-3100}:3100
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  tempo:
    <<: *service-defaults
    image: grafana/tempo:${TEMPO_VERSION:-2.10.5}
    command:
      - -config.file=/etc/tempo/tempo.yml
      - -config.expand-env=true
    environment:
      TEMPO_RETENTION: ${TEMPO_RETENTION:-168h}
    depends_on:
      - prometheus
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${TEMPO_PORT:-3200}:3200
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  alloy:
    <<: *service-defaults
    image: grafana/alloy:${ALLOY_VERSION:-v1.16.1}
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
      - tempo
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${ALLOY_PORT:-12345}:12345
      - ${OTLP_BIND_ADDRESS:-0.0.0.0}:${OTLP_GRPC_PORT:-4317}:4317
      - ${OTLP_BIND_ADDRESS:-0.0.0.0}:${OTLP_HTTP_PORT:-4318}:4318
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data

  node-exporter:
    <<: *service-defaults
    image: quay.io/prometheus/node-exporter:${NODE_EXPORTER_VERSION:-v1.11.1}
    command:
      - --no-collector.filesystem
      - --path.udev.data=/tmp
    pid: host
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${NODE_EXPORTER_PORT:-9100}:9100

  cadvisor:
    <<: *service-defaults
    image: ghcr.io/google/cadvisor:${CADVISOR_VERSION:-v0.57.0}
    privileged: true
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${CADVISOR_PORT:-8080}:8080
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  grafana:
    <<: *service-defaults
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.2}
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/home.json
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

networks:
  observability:
    name: observability
    external: true

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  alloy-data:
  grafana-data:
